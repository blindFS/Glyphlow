version: 2
updates:
  # Enable Dependabot updates for Cargo (Rust dependencies)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly" # Check for updates weekly

  # Enable Dependabot updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Check for updates weekly
